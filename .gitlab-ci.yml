stages:
  - build
  - test
  - deploy

variables:
  APP_NAME: "laboratorio-app"
  BRANCH_NAME: "$CI_COMMIT_BRANCH"
  USER_NAME: "$GITLAB_USER_LOGIN"

build-job:
  stage: build
  script:
    - 'echo "=== ETAPA BUILD ==="'
    - 'echo "Aplicacion: $APP_NAME"'
    - 'echo "Usuario: $USER_NAME"'
    - 'echo "Rama actual: $BRANCH_NAME"'
    - 'echo "Simulando construccion de imagen Docker"'
    - 'mkdir -p build'
    - 'echo "Imagen simulada de $APP_NAME" > build/info.txt'
    - 'echo "Empaquetado completado"'
  artifacts:
    paths:
      - build/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "prueba-ci"'

test-job:
  stage: test
  script:
    - 'echo "=== ETAPA TEST ==="'
    - 'echo "Simulando pruebas del proyecto"'
    - 'sleep 3'
    - 'echo "Pruebas completadas correctamente"'
  dependencies:
    - build-job
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "prueba-ci"'

deploy-job:
  stage: deploy
  script:
    - 'echo "=== ETAPA DEPLOY ==="'
    - 'echo "Simulando despliegue con Docker Compose"'
    - 'echo "docker compose up --build -d"'
    - 'echo "Despliegue completado"'
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'